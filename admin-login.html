  <main class="admin-main page-width padd login-main">


    <div class="login-card">
      <h2 class="login-card__title">Welcome Back</h2>
      <p class="login-card__subtitle">Please login to your account</p>

      <form class="login-card__form" action="/login" method="POST">
        <!-- Email -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <!-- Remember me -->
        <div class="form-check">
          <input type="checkbox" id="remember" name="remember">
          <label for="remember">Remember me</label>
        </div>

        <!-- Submit -->
        <div class="form-actions">
          <button type="submit" class="btn-primary">Login</button>
          <button type="reset" class="btn-secondary">Reset</button>
        </div>
      </form>

      <p class="login-card__footer">
        Don't have an account? <a href="/register">Register here</a>
      </p>
    </div>
  </main>

  
    <script src="up/js/admin.js"></script>
    <script src="up/js/app.js"></script>
