<section class="admin-add-teacher">

  <!-- HEADER -->
  <div class="admin-add-teacher__header">
    <h2 class="admin-add-teacher__title">Add Teacher</h2>

    <a href="admin-teachers.html" class="admin-add-teacher__back-btn">
      <i class="fa-solid fa-arrow-left"></i> Back
    </a>
  </div>

  <!-- FORM -->
  <form action="teacher-save.php" method="POST" enctype="multipart/form-data" class="teacher-form">

    <!-- IMAGE -->
    <div class="form-group">
      <label class="form-label">Teacher Photo</label>

      <div class="image-upload">
        <input type="file" name="teacher_image" id="teacherImage" accept="image/*" required />

        <div class="image-preview" id="imagePreview">
          <span>No image selected</span>
        </div>
      </div>
    </div>

    <!-- NAME -->
    <div class="form-group">
      <label class="form-label">Name</label>
      <input 
        type="text" 
        name="teacher_name" 
        class="form-input" 
        placeholder="Enter teacher name" 
        required
      />
    </div>

    <!-- SUBJECTS -->
    <div class="form-group">
      <label class="form-label">Subjects</label>
      <input 
        type="text" 
        name="teacher_subjects" 
        class="form-input" 
        placeholder="Ex: Mathematics, Physics" 
        required
      />
    </div>

    <!-- SUBMIT BUTTON -->
    <button type="submit" class="form-submit-btn">
      <i class="fa-solid fa-plus"></i> Add Teacher
    </button>

  </form>

</section>

<!-- IMAGE PREVIEW SCRIPT -->
<script>
  const teacherImage = document.getElementById("teacherImage");
  const preview = document.getElementById("imagePreview");

  teacherImage.addEventListener("change", function () {
    const file = this.files[0];

    if (file) {
      const reader = new FileReader();
      reader.onload = function (e) {
        preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
      };
      reader.readAsDataURL(file);
    }
  });
</script>
