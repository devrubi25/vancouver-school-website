<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login-page</title>
    <link rel="stylesheet" href="up/css/admin-style.css" />
    <link rel="stylesheet" href="up/css/main-style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="container">
    <header class="header page-width padd">
      <a class="header__logo-link" href="index.html">
        <img
          src="up/images/Header_logo-removebg-preview.png"
          alt=""
          class="header__logo"
        />
      </a>

      <nav class="header__nav">
        <li><a class="header__nav-link" href="index.html">Home</a></li>
        <li>
          <a class="header__nav-link" href="blogs.html">Blogs</a>
        </li>
        <li><a class="header__nav-link" href="aboutus.html">About Us</a></li>
        <li>
          <a class="header__nav-link" href="activlities.html">Activlities</a>
        </li>
        <li><a class="header__nav-link" href="contacts.html">Contact</a></li>
        <li>
          <a class="header__nav-link" href="blog-details.html">Blog details</a>
        </li>
        <li><a class="links" href="login.html">Login</a></li>
      </nav>

      <div class="hamburger">
        <div class="hamburger__line"></div>
        <div class="hamburger__line"></div>
        <div class="hamburger__line"></div>
      </div>
    </header>
    <main class="admin-main page-width padd login-main">
      <div class="login-card">
        <h2 class="login-card__title">Welcome Back</h2>
        <p class="login-card__subtitle">Please login to your account</p>

        <form class="login-card__form" action="/login" method="POST">
          <!-- Email -->
          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              required
            />
          </div>

          <!-- Password -->
          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
            />
          </div>

          <!-- Remember me -->
          <div class="form-check">
            <input type="checkbox" id="remember" name="remember" />
            <label for="remember">Remember me</label>
          </div>

          <!-- Submit -->
          <div class="form-actions">
            <button type="submit" class="btn-primary">Login</button>
            <button type="reset" class="btn-secondary">Reset</button>
          </div>
        </form>

        <p class="login-card__footer">
          Don't have an account? <a href="register.html">Register here</a>
        </p>
      </div>
    </main>

    <script src="up/js/admin.js"></script>
    <script src="up/js/app.js"></script>
  </body>
</html>
