      <section class="admin-leadership-add">
        <!-- HEADER -->
        <div class="admin-leadership-add__header">
          <h2 class="admin-leadership-add__title">Add Leadership Member</h2>

          <a
            href="admin-leadership.html"
            class="admin-leadership-add__back-btn"
          >
            <i class="fa-solid fa-arrow-left"></i> Back
          </a>
        </div>

        <!-- ADD leadership FORM -->
        <form
          action="save-leadership.php"
          method="post"
          enctype="multipart/form-data"
          class="leadership-form"
        >
          <!-- PHOTO -->
          <div class="leadership-form__group">
            <label for="photo" class="leadership-form__label">Photo</label>
            <input
              type="file"
              id="photo"
              name="photo"
              class="leadership-form__input"
              accept="image/*"
              required
            />
          </div>

          <!-- NAME -->
          <div class="leadership-form__group">
            <label for="name" class="leadership-form__label">Full Name</label>
            <input
              type="text"
              id="name"
              name="name"
              class="leadership-form__input"
              placeholder="Enter member name"
              required
            />
          </div>

          <!-- DESIGNATION -->
          <div class="leadership-form__group">
            <label for="designation" class="leadership-form__label"
              >Designation</label
            >
            <input
              type="text"
              id="designation"
              name="designation"
              class="leadership-form__input"
              placeholder="e.g. Principal"
              required
            />
          </div>

          <!-- QUOTE -->
          <div class="leadership-form__group">
            <label for="quote" class="leadership-form__label">Quote</label>
            <textarea
              id="quote"
              name="quote"
              rows="4"
              class="leadership-form__textarea"
              placeholder="Enter inspirational quote…"
              required
            ></textarea>
          </div>

          <!-- SUBMIT BUTTON -->
          <button type="submit" class="leadership-form__submit">
            <i class="fa-solid fa-floppy-disk"></i> Save Member
          </button>
        </form>
      </section>
