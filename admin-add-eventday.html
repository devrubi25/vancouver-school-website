      <!-- ADMIN — ADD EVENT DAY PAGE   -->

      <section class="admin-add-eventday">
        <!-- HEADER -->
        <div class="admin-add-eventday__header">
          <h2 class="admin-add-eventday__title">Add Event Day</h2>

          <a href="admin-events.html" class="admin-add-eventday__back-btn">
            <i class="fa-solid fa-arrow-left"></i> Back
          </a>
        </div>

        <!-- FORM -->
        <form action="eventday-save.php" method="POST" class="eventday-form">
          <!-- DATE -->
          <div class="form-group">
            <label class="form-label">Event Date</label>
            <input type="date" name="event_date" class="form-input" required />
          </div>

          <!-- DAY NAME -->
          <div class="form-group">
            <label class="form-label">Day</label>
            <input
              type="text"
              name="event_dayname"
              class="form-input"
              placeholder="Ex: Thursday"
              required
            />
          </div>

          <!-- MONTH -->
          <div class="form-group">
            <label class="form-label">Month Label</label>
            <input
              type="text"
              name="event_month"
              class="form-input"
              placeholder="Ex: November 2024"
              required
            />
          </div>

          <!-- ========================= -->
          <!-- EVENT ITEMS REPEATER      -->
          <!-- ========================= -->

          <div class="event-items-wrapper" id="eventItemsWrapper">
            <div class="event-item-block">
              <div class="form-group">
                <label class="form-label">Time</label>
                <input
                  type="text"
                  name="event_time[]"
                  class="form-input"
                  placeholder="Ex: 7:00am – 2:00pm"
                  required
                />
              </div>

              <div class="form-group">
                <label class="form-label">Event Title</label>
                <input
                  type="text"
                  name="event_title[]"
                  class="form-input"
                  placeholder="Ex: Science Exhibition"
                  required
                />
              </div>

              <button type="button" class="event-item-block__remove">
                <i class="fa-solid fa-trash"></i> Remove
              </button>
            </div>
          </div>

          <!-- ADD MORE EVENTS BUTTON -->
          <button type="button" class="eventday-add-event-btn" id="addEventBtn">
            <i class="fa-solid fa-plus"></i> Add Another Event
          </button>

          <!-- SUBMIT -->
          <button type="submit" class="eventday-submit">
            <i class="fa-solid fa-check"></i> Save Event Day
          </button>
        </form>
      </section>

      <!-- JS for Dynamic Event Items -->
      <script>
        const wrapper = document.getElementById("eventItemsWrapper");
        const addBtn = document.getElementById("addEventBtn");

        addBtn.addEventListener("click", () => {
          const block = document.createElement("div");
          block.className = "event-item-block";
          block.innerHTML = `
      <div class="form-group">
        <label class="form-label">Time</label>
        <input type="text" name="event_time[]" class="form-input" placeholder="Ex: 1:00pm – 2:00pm" required />
      </div>

      <div class="form-group">
        <label class="form-label">Event Title</label>
        <input type="text" name="event_title[]" class="form-input" placeholder="Ex: Cultural Dance" required />
      </div>

      <button type="button" class="event-item-block__remove">
        <i class="fa-solid fa-trash"></i> Remove
      </button>
    `;

          wrapper.appendChild(block);
        });

        wrapper.addEventListener("click", (e) => {
          if (e.target.closest(".event-item-block__remove")) {
            e.target.closest(".event-item-block").remove();
          }
        });
      </script>
