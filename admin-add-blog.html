        <!-- Blog Add Form Section -->
        <section class="admin-blog padd">
          <h2 class="admin-blog__title sec-sub-title">Create News Post</h2>

          <form class="blog-form">
            <!-- Blog Title -->
            <div class="form-group">
              <label for="blogTitleInput">Title</label>
              <input
                id="blogTitleInput"
                name="title"
                type="text"
                placeholder="Enter blog title"
                required
              />
            </div>

            <!-- Slug (Auto-generated) -->
            <div class="form-group">
              <label for="blogSlugInput">URL (auto-generated)</label>
              <input
                id="blogSlugInput"
                name="slug"
                type="text"
                placeholder="auto-generated or edit manually"
              />
            </div>

            <!-- Category -->
            <div class="form-group">
              <label for="category">Category</label>
              <select id="category" name="category">
                <option value="">Select category</option>
                <option value="tech">Tech</option>
                <option value="news">News</option>
                <option value="lifestyle">Lifestyle</option>
                <option value="gadgets">Gadgets</option>
              </select>
            </div>

            <!-- Short Description -->
            <div class="form-group form-group--description">
              <label for="description">Short Description</label>
              <textarea id="description" name="description"></textarea>
            </div>

            <!-- Blog Body -->
            <div class="form-group admin-blog-editor">
              <label for="editor-container">Body</label>

              <div id="editor-container"></div>

              <input type="hidden" name="body" id="hidden-body" />

              <button
                type="button"
                class="preview-toggle-btn"
                id="preview-button"
              >
                Preview Content
              </button>

              <div id="editor-preview" class="editor-preview"></div>
            </div>

            <!-- Image Upload -->
            <div class="form-group">
              <label for="image">Upload Image</label>
              <input id="image" name="image" type="file" />
            </div>

            <!-- Featured -->
            <div class="form-group form-check">
              <label for="featured">
                <input type="checkbox" id="featured" name="featured" />
                Mark as Featured
              </label>
            </div>

            <!-- Status -->
            <div class="form-group">
              <label for="status">Status</label>
              <select id="status" name="status">
                <option value="draft">Draft</option>
                <option value="publish">Publish</option>
              </select>
            </div>

            <!-- Submit -->
            <div class="form-actions">
              <button type="submit" class="btn-primary">Publish</button>
              <button type="reset" class="btn-secondary">Clear</button>
            </div>
          </form>
        </section>

        <script>
  const blogTitleInput = document.getElementById("blogTitleInput");
  const blogSlugInput = document.getElementById("blogSlugInput");

  let slugEditedManually = false;

  // Detect manual slug changes — stop auto update
  blogSlugInput.addEventListener("input", () => {
    slugEditedManually = true;
  });

  blogTitleInput.addEventListener("input", function () {
    if (slugEditedManually) return; // stop auto-update after manual edit

    const slug = this.value
      .toLowerCase()
      .trim()
      .replace(/[^a-z0-9\s-]/g, "")
      .replace(/\s+/g, "-");

    blogSlugInput.value = slug;
  });
</script>
